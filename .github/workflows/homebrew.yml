name: Update Homebrew formula

# Automatically bumps the Homebrew tap formula when a new release is
# published. Computes the SHA256 of the source tarball and pushes an
# updated Formula/audiorec.rb to pmoust/homebrew-audiorec.
#
# Requires: a PAT stored as HOMEBREW_TAP_TOKEN with repo scope on
# pmoust/homebrew-audiorec. Create at https://github.com/settings/tokens
# and add via https://github.com/pmoust/audiorec/settings/secrets/actions

on:
  release:
    types: [published]

jobs:
  update-formula:
    runs-on: ubuntu-latest
    steps:
      - name: Update tap formula
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ github.event.release.tag_name }}"
          echo "Updating formula for ${TAG}"

          # Compute SHA256 of the source tarball.
          SHA=$(curl -sL "https://github.com/pmoust/audiorec/archive/refs/tags/${TAG}.tar.gz" \
            | sha256sum | cut -d' ' -f1)
          echo "SHA256: ${SHA}"

          # Clone the tap, update the formula, push.
          gh repo clone pmoust/homebrew-audiorec /tmp/tap -- --depth 1
          cd /tmp/tap

          sed -i "s|url \".*\"|url \"https://github.com/pmoust/audiorec/archive/refs/tags/${TAG}.tar.gz\"|" Formula/audiorec.rb
          sed -i "s|sha256 \".*\"|sha256 \"${SHA}\"|" Formula/audiorec.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/audiorec.rb
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "audiorec ${TAG}"
          git push
